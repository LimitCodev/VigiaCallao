name: vigia_callao
description: "Centro de Control VigíaCallao — analítica de video en tiempo real para el Puerto del Callao."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Tipografía (Poppins, Inter, JetBrains Mono) sin tener que
  # empaquetar los .ttf manualmente.
  google_fonts: ^6.2.1

  # Llamadas REST al backend Flask (Sección 10 del documento).
  http: ^1.2.2

  # WebSocket en tiempo real con Flask-SocketIO (evento "new_alert").
  socket_io_client: ^2.0.3+1

  # Variables de entorno (.env de la carpeta frontend, Sección 9).
  flutter_dotenv: ^5.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
